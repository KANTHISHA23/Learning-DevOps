name: CI + Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # 1. Download your GitHub repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Install dependencies
      - name: Install Packages
        run: npm install

      # 4. Verify project files
      - name: Verify HTML exists
        run: |
          if [ -f index.html ]; then
            echo "Website found!"
          else
            echo "Website missing!"
            exit 1
          fi

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t ishakanth/learning-devops:latest .

      # 7. Push image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ishakanth/learning-devops:latest