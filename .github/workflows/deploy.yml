name: React CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Packages
        run: npm install

      - name: Verify HTML exists
        run: |
          if [ -f index.html ]; then
            echo "Website found!"
          else
            echo "Website missing!"
            exit 1
          fi